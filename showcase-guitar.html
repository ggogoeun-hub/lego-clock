<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통기타 시안 v3</title>
  <link rel="stylesheet" href="style.css?v=6">
  <style>
    :root {
      --cell: 9px;
      --bg-stud: 5px;
    }
    html, body { height: auto; overflow: auto; }
    body {
      background: #4A90E2
        radial-gradient(circle at 50% 50%,
          rgba(255,255,255,0.22) 0%,
          rgba(255,255,255,0.22) 22%,
          rgba(0,0,0,0.10) 26%,
          rgba(0,0,0,0.10) 32%,
          transparent 34%);
      background-size: 5px 5px;
      padding: 40px;
    }
    h1 {
      color: white;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      margin-bottom: 24px;
      text-shadow: 0 2px 0 rgba(0,0,0,0.4);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 50px 30px;
      max-width: 1200px;
    }
    .sample {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 14px;
      background: rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      min-height: 320px;
      justify-content: flex-end;
    }
    .sample-pattern {
      display: grid;
      gap: 0;
    }
    .sample-label {
      color: white;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.5);
      text-align: center;
    }
    .sample-label small {
      display: block;
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <h1>통기타 LEGO 시안 v3 — 첨부 이미지 직접 카피</h1>
  <div class="grid">
    <div class="sample"><div class="sample-pattern" id="g1"></div><div class="sample-label">A<small>어쿠스틱 살구 (좌상 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g2"></div><div class="sample-label">B<small>Les Paul 노랑 (상중 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g3"></div><div class="sample-label">C<small>Tele 와인 (우상 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g4"></div><div class="sample-label">D<small>Strat 빨강 (중좌 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g5"></div><div class="sample-label">E<small>Strat 검정 (중앙 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g6"></div><div class="sample-label">F<small>Flying V 빨강 (중우 카피)</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g7"></div><div class="sample-label">G<small>빨강+오렌지 일렉</small></div></div>
    <div class="sample"><div class="sample-pattern" id="g8"></div><div class="sample-label">H<small>녹색 일렉</small></div></div>
  </div>

    const CHAR_CLASS = {
      'B':'g','L':'gl','S':'gs',
      'g':'gy','d':'gyd',
      'w':'w','W':'ws',
      'K':'k',
      'O':'br',            // wood (라이트 갈색)
      'D':'wd',            // dark wood
      // 기타 컬러 팔레트
      '1':'c1',            // cream (어쿠스틱 살구)
      '2':'c2',            // yellow
      '3':'c3',            // red
      '4':'c4',            // wine
      '5':'c5',            // blue
      '6':'c6',            // silver/회색
      '7':'c7',            // orange
      '8':'c8',            // grass green
    };
    function render(container, rows) {
      const cols = Math.max(...rows.map(r => r.length));
      container.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
      container.style.gridTemplateRows = `repeat(${rows.length}, var(--cell))`;
      rows.forEach(row => {
        const padded = row.padEnd(cols, '.');
        for (const ch of padded) {
          const div = document.createElement('div');
          if (ch === '.') div.style.background = 'transparent';
          else div.className = 'cell ' + (CHAR_CLASS[ch] || '');
          container.appendChild(div);
        }
      });
    }
