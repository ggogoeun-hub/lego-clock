<!DOCTYPE html>
<html lang="ko" data-mode="digital">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LEGO Clock">
  <meta name="theme-color" content="#4A90E2">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>LEGO Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <!-- D/A mode toggle — always visible, top-left -->
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="digital">D</button>
    <button class="mode-btn" data-mode="analog">A</button>
  </div>

  <div class="sky">
    <!-- Clouds — drift horizontally; each with own speed + phase -->
    <div class="cloud" style="top: 14%;  --d: 90s;  --del:   0s;"></div>
    <div class="cloud cloud-swap" style="top: 22%;  --d: 120s; --del: -55s;"></div>
    <div class="cloud creative-art" data-art="creativeA" style="top: 22%;  --d: 120s; --del: -55s;"></div>
    <div class="cloud" style="bottom: 14%; --d: 105s; --del: -75s;"></div>
    <div class="cloud" style="bottom: 6%;  --d: 80s;  --del: -25s;"></div>

    <!-- Music SVG floats — visible only on orange theme -->
    <img class="svg-float" src="icon_image/guitar2-svgrepo-com.svg"              alt="" style="width: calc(var(--cell) * 5.75); top: 12%;   --d: 85s;  --del:   0s;">
    <img class="svg-float" src="icon_image/music2-svgrepo-com.svg"          alt="" style="width: calc(var(--cell) * 4);top: 24%;   --d: 110s; --del: -45s;">
    <img class="svg-float" src="icon_image/music2-svgrepo-com.svg"          alt="" style="width: calc(var(--cell) * 4);bottom: 16%; --d: 95s;  --del: -65s;">
    <img class="svg-float" src="icon_image/valentines-flower-svgrepo-com.svg"               alt="" style="bottom: 8%;  --d: 75s;  --del: -20s;">

    <!-- Clock face -->
    <div class="clock">
      <div class="time" id="time"></div>
    </div>

    <!-- Bottom labels -->
    <div class="label ampm" id="ampm">PM</div>
    <div class="label date" id="date">05.20&nbsp;&nbsp;WED</div>

    <!-- Color picker -->
    <div class="color-picker" id="colorPicker">
      <button class="color-dot" data-theme="white"  style="--dot-c: #ECEFF3;" aria-label="White"></button>
      <button class="color-dot active" data-theme="green" style="--dot-c: #6BB13C;" aria-label="Green"></button>
      <button class="color-dot" data-theme="orange" style="--dot-c: #F08C28;" aria-label="Orange"></button>
    </div>
  </div>

  <!-- Analog mode screen -->
  <div class="analog-screen" id="analogScreen">
    <div class="analog-clock-wrap">
      <div class="analog-dial"></div>
      <svg viewBox="0 0 100 100">
        <g id="analog-ticks"></g>
        <text class="a-num" x="50" y="16">12</text>
        <text class="a-num" x="84" y="50">3</text>
        <text class="a-num" x="50" y="84.5">6</text>
        <text class="a-num" x="16" y="50">9</text>
        <rect class="a-date-pill" x="60" y="34.5" width="17" height="6.6" rx="3.3"></rect>
        <text class="a-date-text" id="analogDate" x="68.5" y="38">--- --</text>
        <line class="a-hand a-hour"   id="analogHour"   x1="50" y1="50" x2="50" y2="30"></line>
        <line class="a-hand a-minute" id="analogMinute" x1="50" y1="50" x2="50" y2="20"></line>
        <line class="a-hand a-second" id="analogSecond" x1="50" y1="58" x2="50" y2="18"></line>
        <circle class="a-cap"         cx="50" cy="50" r="2.4"></circle>
        <circle class="a-cap-ring"    cx="50" cy="50" r="2.4"></circle>
        <circle class="a-cap-accent"  cx="50" cy="50" r="1"></circle>
      </svg>
    </div>
    <div class="analog-picker">
      <button class="a-swatch active" data-theme="green" aria-label="그린"></button>
      <button class="a-swatch"        data-theme="white" aria-label="라이트"></button>
      <button class="a-swatch"        data-theme="black" aria-label="다크"></button>
    </div>
  </div>

  <script src="script.js?v=8"></script>
</body>
</html>
